name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Structural validation
        run: python3 scripts/validate.py --format json

      - name: Unit tests
        run: python3 -m unittest discover -s tests -p "test_*.py" -v
